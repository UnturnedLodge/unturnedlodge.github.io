name: Prepare Theme Release for Starter

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Theme version to set in gemspec (e.g. 7.5.0-tuofork.1)"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release for the tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Node dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm i
          fi

      - name: Build theme assets
        run: npm run build

      - name: Verify Jekyll build
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll b

      - name: Bump gemspec version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          ruby -e 'path = "jekyll-theme-chirpy.gemspec"; ver = ENV.fetch("VERSION"); src = File.read(path); out = src.sub(/spec\.version\s*=\s*"[^"]+"/, "spec.version       = \"#{ver}\""); raise "spec.version not found in gemspec" if src == out; File.write(path, out)'

      - name: Commit version and generated assets
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            git commit -m "chore(release): ${VERSION}"
          fi

      - name: Create and push tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
            exit 1
          fi

          git tag "$TAG"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
